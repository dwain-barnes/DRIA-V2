services:
  app:
    depends_on:
      - speech-to-speech
      - llama-cpp
    environment:
      REALTIME_WS_URL: ws://speech-to-speech:8765/v1/realtime
      LLAMACPP_BASE_URL: http://llama-cpp:8080/v1
      VISION_API_BASE_URL: http://llama-cpp:8080/v1
      AGENT_MEMORY_API_BASE_URL: http://llama-cpp:8080/v1

  llm-model-downloader:
    build:
      context: .
      dockerfile: docker/model-downloader/Dockerfile
    environment:
      HF_HOME: /cache/huggingface
      HUGGINGFACE_HUB_CACHE: /cache/huggingface/hub
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
      LLM_MODEL_REPO: ${LLM_MODEL_REPO:-unsloth/gemma-4-E4B-it-GGUF}
      LLAMA_CPP_MODEL_FILE: ${LLAMA_CPP_MODEL_FILE:-gemma-4-E4B-it-Q8_0.gguf}
      LLAMA_CPP_MMPROJ_FILE: ${LLAMA_CPP_MMPROJ_FILE:-mmproj-BF16.gguf}
      MODEL_DIR: /models
    volumes:
      - llm_models:/models
      - llm_hf_cache:/cache/huggingface
    restart: "no"

  llama-cpp:
    image: ${LLAMA_CPP_IMAGE:-ghcr.io/ggml-org/llama.cpp:server-cuda}
    gpus: all
    depends_on:
      llm-model-downloader:
        condition: service_completed_successfully
    command:
      - -m
      - /models/${LLAMA_CPP_MODEL_FILE:-gemma-4-E4B-it-Q8_0.gguf}
      - --mmproj
      - /models/${LLAMA_CPP_MMPROJ_FILE:-mmproj-BF16.gguf}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - -c
      - ${LLAMA_CPP_CONTEXT:-32768}
      - -ngl
      - ${LLAMA_CPP_N_GPU_LAYERS:-99}
      - -np
      - ${LLAMA_CPP_PARALLEL:-2}
      - --jinja
    ports:
      - "${LLAMA_CPP_PORT:-8080}:8080"
    volumes:
      - llm_models:/models:ro
    restart: unless-stopped

  speech-to-speech:
    build:
      context: .
      dockerfile: docker/speech-to-speech/Dockerfile
    image: dria-speech-to-speech:0.2.6-cu130
    gpus: all
    depends_on:
      - llama-cpp
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-not-needed}
      S2S_RESPONSES_API_BASE_URL: ${S2S_RESPONSES_API_BASE_URL:-http://llama-cpp:8080/v1}
      S2S_MODEL_NAME: ${S2S_MODEL_NAME:-gemma-4-E4B-it}
      S2S_WS_HOST: 0.0.0.0
      S2S_WS_PORT: 8765
      HF_HOME: /models/huggingface
      HUGGINGFACE_HUB_CACHE: /models/huggingface/hub
      TORCH_HOME: /models/torch
      NLTK_DATA: /models/nltk
    ports:
      - "${S2S_HOST_PORT:-8765}:8765"
    volumes:
      - ./:/workspace:ro
      - s2s_hf_cache:/models/huggingface
      - s2s_torch_cache:/models/torch
      - s2s_nltk_cache:/models/nltk
      - s2s_ref_audio:/models/qwen3-tts
    shm_size: ${S2S_SHM_SIZE:-8gb}
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import socket; s=socket.create_connection(('127.0.0.1', 8765), 3); s.close()"
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 5

volumes:
  llm_models:
  llm_hf_cache:
  s2s_hf_cache:
  s2s_torch_cache:
  s2s_nltk_cache:
  s2s_ref_audio:
