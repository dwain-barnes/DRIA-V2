# SearXNG settings for use as Firecrawl's search backend.
# Generate a real secret with: openssl rand -hex 32

use_default_settings: true

server:
  secret_key: "dria-local-searxng-secret-change-before-public-use"
  limiter: false
  image_proxy: true

search:
  formats:
    - html
    - json
  safe_search: 0
